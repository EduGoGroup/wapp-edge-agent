name: CI

# CI de PR/push para wapp-edge-agent (módulo Go único, público).
# Adaptado del patrón de API de EduGo y de wapp-shared/ci.yml (Go 1.26,
# golangci-lint v2.12.2 — el pin previo v2.4.0 estaba compilado con go1.25 y
# no soporta go 1.26). SIN deploy a GCP ni GitHub Packages (no aplica a wApp).
# Como los módulos wApp son PÚBLICOS, NO se necesita GOPRIVATE ni token: el
# proxy público resuelve las dependencias (wapp-shared/*, wapp-cloudlink).
# (El cross-build de los 5 targets del Edge es un concern de release, no de CI; se añadirá aparte.)
on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main] # red de seguridad

env:
  GO_VERSION: '1.26'

jobs:
  test:
    name: Tests + estática
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: gofmt (sin archivos sin formatear)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Archivos sin gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: Descargar dependencias
        run: go mod download

      - name: go.mod / go.sum tidy (sin diff)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: Tests (race)
        run: go test -race ./...

      - name: Build
        run: go build ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m
